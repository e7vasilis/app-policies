<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Sync | Legal Hub</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #10b981; --text: #1e293b; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; line-height: 1.6; color: var(--text); background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 3rem; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 90%; border: 1px solid #e2e8f0; }
        .icon { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
        h1 { font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -0.05em; color: #0f172a; }
        p { color: #64748b; margin-bottom: 2.5rem; font-weight: 500; }
        .links { display: flex; flex-direction: column; gap: 1rem; }
        .btn { padding: 1.2rem; border-radius: 1rem; text-decoration: none; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; border: 2px solid transparent; }
        .btn-p { background: var(--primary); color: white; }
        .btn-p:hover { background: #2563eb; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .btn-s { background: white; border-color: #e2e8f0; color: #64748b; }
        .btn-s:hover { border-color: var(--secondary); color: var(--secondary); transform: translateY(-3px); }
        footer { position: absolute; bottom: 2rem; font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">✈️</span>
        <h1>ATC Sync</h1>
        <p>Legal & Compliance Center</p>
        
        <div class="links">
            <a href="privacy.html" class="btn btn-p">Privacy Policy</a>
            <a href="terms.html" class="btn btn-s">Terms of Service</a>
        </div>
    </div>
    <footer>
        &copy; 2026 ATC Sync &bull; Vasileios Evangelakos
    </footer>
</body>
</html>
